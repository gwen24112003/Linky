# /etc/nginx/sites-available/opusadvisor
# Symlink: ln -s /etc/nginx/sites-available/opusadvisor /etc/nginx/sites-enabled/
#
# Sert la sortie statique de `next build` (output: 'export') depuis /var/www/linky/out.
# Certificats Let's Encrypt gérés par Certbot pour opusadvisor.fr.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name opusadvisor.fr www.opusadvisor.fr;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name opusadvisor.fr www.opusadvisor.fr;

    ssl_certificate     /etc/letsencrypt/live/opusadvisor.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opusadvisor.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/linky/out;
    index index.html;

    # Assets Next.js — hash dans le nom, cache long
    location /_next/static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images et fichiers statiques du répertoire public/
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif|woff2?|ttf|eot|otf)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Articles markdown (si consultés directement)
    # try_files explicite pour éviter un 403 si nginx n'arrive pas à résoudre
    # l'index.html (race pendant build, inheritance quirks, etc.)
    location /articles/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    # Routing Next static export avec trailingSlash: true
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Pages d'erreur
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Sécurité de base
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
