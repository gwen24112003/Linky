[build]
  # Commande pour build le projet
  command = "npm run build"
  
  # Dossier à publier (celui généré par le build)
  publish = "build"
  
  # Dossier de base du projet
  base = "."

# Configuration Node.js
[build.environment]
  NODE_VERSION = "18"

# Redirections pour React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
